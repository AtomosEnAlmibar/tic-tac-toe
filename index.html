<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="board">
    </div>
    <div class="turn-message"></div>
    <dialog id="set-player-name-dialog">
        <form class="dialog-flex">
            <span class="dialog-main-title">Select names</span>
            <div class="form-block">
                <div class="fieldset">
                    <label for="title">Player 1</label>
                    <input type="text" name="player1Name" id="player1Name" required>
                </div>
                <div class="fieldset">
                    <label for="author">Player 2</label>
                    <input type="text" name="player2Name" id="player2Name" required>
                </div>
            </div>
            <button class="dialog-confirm-button" id="set-player-name-button" type="submit">Confirm</button>
        </form>
    </dialog>
    <dialog id="restart-game-dialog"></dialog>
</body>

</html>
